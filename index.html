<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Neon Snake Telegram WebApp</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="panel stats-panel">
        <div class="stat"><span aria-label="Монеты">🪙</span><strong id="scoreValue">0</strong></div>
        <div class="stat"><span>LVL</span><strong id="levelValue">1/100</strong></div>
        <div class="stat"><span aria-label="Скорость">👟</span><strong id="speedValue">0</strong></div>
        <div class="stat"><span aria-label="Бананы">🍌</span><strong id="bananaValue">0</strong></div>
        <div class="stat"><span aria-label="Вишни">🍒</span><strong id="cherryValue">0</strong></div>
        <div class="stat"><span aria-label="Бриллианты">💎</span><strong id="diamondValue">0</strong></div>
      </header>

      <main class="board-wrap">
        <button class="shop-fab" id="shopToggleBtn" aria-label="Открыть магазин">☰</button>
        <canvas id="gameCanvas" aria-label="Игровое поле змейки"></canvas>
      </main>

      <section class="panel controls-panel">
        <div class="controls-grid">
          <div class="control-group vertical">
            <button class="btn neon-btn dir-btn" data-direction="left" aria-label="Влево">◀</button>
            <button class="btn neon-btn dir-btn" data-direction="right" aria-label="Вправо">▶</button>
          </div>

          <div class="control-group center">
            <button class="btn action-btn center-btn" id="pauseBtn" aria-label="Продолжить или пауза">▶</button>
            <button class="btn action-btn center-btn" id="restartBtn" aria-label="Рестарт">↻</button>
          </div>

          <div class="control-group horizontal">
            <button class="btn neon-btn dir-btn" data-direction="up" aria-label="Вверх">▲</button>
            <button class="btn neon-btn dir-btn" data-direction="down" aria-label="Вниз">▼</button>
          </div>
        </div>
      </section>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="panel overlay-card">
        <h2>Game Over</h2>
        <p id="gameOverText">Попробуй снова!</p>
        <div class="overlay-actions">
          <button class="btn action-btn" id="overlayRestartBtn">Restart</button>
          <button class="btn ghost-btn" id="resetProgressBtn">Начать с 1 уровня</button>
        </div>
      </div>
    </div>

    <aside class="side-drawer hidden" id="shopDrawer">
      <div class="panel drawer-card">
        <div class="drawer-header">
          <h3>Shop</h3>
          <button class="btn ghost-btn drawer-close" id="shopCloseBtn" aria-label="Закрыть магазин">✕</button>
        </div>

        <section class="drawer-section">
          <h4>Скины змейки (1000 🪙)</h4>
          <div class="skin-list" id="skinList">
            <button class="btn skin-btn" data-skin-id="plasma">Plasma</button>
            <button class="btn skin-btn" data-skin-id="ember">Ember</button>
            <button class="btn skin-btn" data-skin-id="frost">Frost</button>
          </div>
        </section>

        <section class="drawer-section">
          <h4>Обмен на очки</h4>
          <div class="exchange-list">
            <button class="btn exchange-btn" data-exchange="banana">🍌 → 🪙</button>
            <button class="btn exchange-btn" data-exchange="cherry">🍒 → 🪙</button>
            <button class="btn exchange-btn" data-exchange="diamond">💎 → 🪙</button>
          </div>
        </section>
      </div>
    </aside>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
