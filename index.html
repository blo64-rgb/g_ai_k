<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Neon Snake Telegram WebApp</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <div class="panel menu-panel">
          <button class="shop-inline-btn" id="shopToggleBtn" aria-label="Открыть магазин">☰</button>
        </div>
        <div class="panel stats-panel">
          <div class="stat"><span aria-label="Монеты">🪙</span><strong id="scoreValue">0</strong></div>
          <div class="stat"><span>LVL</span><strong id="levelValue">1/100</strong></div>
          <div class="stat"><span aria-label="Скорость">👟</span><strong id="speedValue">0</strong></div>
          <div class="stat"><span aria-label="Бананы">🍌</span><strong id="bananaValue">0</strong></div>
          <div class="stat"><span aria-label="Вишни">🍒</span><strong id="cherryValue">0</strong></div>
          <div class="stat"><span aria-label="Бриллианты">💎</span><strong id="diamondValue">0</strong></div>
        </div>
      </header>

      <main class="board-wrap">
        <div class="play-area">
          <canvas id="gameCanvas" aria-label="Игровое поле змейки"></canvas>
          <aside class="side-drawer hidden" id="shopDrawer">
            <div class="panel drawer-card">
              <div class="drawer-header">
                <h3>Shop</h3>
                <button class="btn ghost-btn drawer-close" id="shopCloseBtn" aria-label="Закрыть магазин">✕</button>
              </div>

              <div class="drawer-tabs">
                <button class="btn drawer-tab active" data-tab="skins">🎭 Скины</button>
                <button class="btn drawer-tab" data-tab="exchange">💱 Обмен</button>
              </div>

              <section class="drawer-section tab-panel" data-panel="skins">
                <h4>Стили змейки</h4>
                <div class="skin-list" id="skinList">
                  <button class="btn skin-btn" data-skin-id="clown">
                    <span class="skin-preview clown">
                      <span class="seg body"></span><span class="seg body"></span><span class="seg head"></span><span class="cap"></span>
                    </span>
                    <span class="skin-name">Клоун</span>
                  </button>
                  <button class="btn skin-btn" data-skin-id="hardpunk">
                    <span class="skin-preview hardpunk">
                      <span class="seg body"></span><span class="seg body"></span><span class="seg head"></span><span class="spike s1"></span><span class="spike s2"></span>
                    </span>
                    <span class="skin-name">Хард-панк</span>
                  </button>
                  <button class="btn skin-btn" data-skin-id="neo">
                    <span class="skin-preview neo">
                      <span class="seg body"></span><span class="seg body"></span><span class="seg head"></span>
                    </span>
                    <span class="skin-name">Нео</span>
                  </button>
                </div>
              </section>

              <section class="drawer-section tab-panel hidden" data-panel="exchange">
                <h4>Обмен в монеты</h4>
                <div class="exchange-list">
                  <button class="btn exchange-btn" data-exchange="banana">🍌 1 = 5 🪙</button>
                  <button class="btn exchange-btn" data-exchange="cherry">🍒 1 = 10 🪙</button>
                  <button class="btn exchange-btn" data-exchange="diamond">💎 1 = 20 🪙</button>
                </div>
              </section>
            </div>
          </aside>
        </div>
      </main>

      <section class="panel controls-panel">
        <div class="controls-grid">
          <div class="control-group vertical">
            <button class="btn neon-btn dir-btn" data-direction="left" aria-label="Влево">◀</button>
            <button class="btn neon-btn dir-btn" data-direction="right" aria-label="Вправо">▶</button>
          </div>

          <div class="control-group center">
            <button class="btn action-btn center-btn" id="pauseBtn" aria-label="Продолжить или пауза">▶</button>
            <button class="btn action-btn center-btn" id="restartBtn" aria-label="Рестарт">↻</button>
          </div>

          <div class="control-group horizontal">
            <button class="btn neon-btn dir-btn" data-direction="up" aria-label="Вверх">▲</button>
            <button class="btn neon-btn dir-btn" data-direction="down" aria-label="Вниз">▼</button>
          </div>
        </div>
      </section>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="panel overlay-card">
        <h2>Game Over</h2>
        <p id="gameOverText">Попробуй снова!</p>
        <div class="overlay-actions">
          <button class="btn action-btn" id="overlayRestartBtn">Restart</button>
          <button class="btn ghost-btn" id="resetProgressBtn">Начать с 1 уровня</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
